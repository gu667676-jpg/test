<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups & Channels</title>
    <style>
        /* إعدادات الخلفية الثابتة والمتحركة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a; /* أسود ملكي غامق */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* أنيميشن الخلفية - عناصر تتحرك بلطف */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* عشان تفضل ورا الكروت */
            pointer-events: none;
        }

        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.03); /* دوائر بيضاء شفافة جداً */
            border-radius: 50%;
            animation: floatAround 25s infinite linear;
        }

        /* تحديد أحجام وأماكن مختلفة لعناصر الخلفية */
        .circle:nth-child(1) { width: 150px; height: 150px; top: 10%; left: 10%; animation-duration: 20s; }
        .circle:nth-child(2) { width: 250px; height: 250px; top: 60%; left: 80%; animation-duration: 30s; }
        .circle:nth-child(3) { width: 100px; height: 100px; top: 40%; left: 40%; animation-duration: 15s; }
        .circle:nth-child(4) { width: 180px; height: 180px; top: 80%; left: 20%; animation-duration: 25s; }

        @keyframes floatAround {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-40px) rotate(180deg) scale(1.1); }
            100% { transform: translateY(0) rotate(360deg) scale(1); }
        }

        /* العنوان الرئيسي */
        h1 {
            text-align: center;
            color: #ffffff; 
            font-size: 2.2rem;
            letter-spacing: 1px;
            margin-bottom: 35px;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 2px solid #222;
            display: inline-block;
            padding-bottom: 10px;
            left: 50%;
            position: relative;
            transform: translateX(-50%);
        }

        /* شبكة العرض: صورتين جنب بعض */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 850px;
            margin: 0 auto;
        }

        /* كارت القناة - أبيض وأسود */
        .channel-card {
            background-color: #121212; /* أسود هادئ */
            border: 1px solid #222222; /* إطار رمادي غامق */
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* تأثير عند التمرير على الكارت */
        .channel-card:hover {
            transform: translateY(-5px);
            border-color: #ffffff; /* يتحول الإطار للون الأبيض */
            box-shadow: 0 12px 30px rgba(255,255,255,0.05);
        }

        /* حاوية الصورة الطولية (نفس أبعاد السكرين المرسلة) */
        .screenshot-container {
            width: 100%;
            aspect-ratio: 9 / 19.5;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        .screenshot-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%); /* لمسة سينمائية خفيفة، لو عايزها أبيض وأسود تماماً خليها 100% */
            transition: filter 0.3s;
        }

        .channel-card:hover .screenshot-container img {
            filter: grayscale(0%); /* الألوان تنطق كاملة لما تقف بالماوس على الكارت */
        }

        /* التفاصيل */
        .channel-details {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .channel-title {
            font-size: 1.15rem;
            font-weight: 600;
            text-align: center;
            color: #ffffff;
        }

        /* زر الوصف القابل للفتح - بتصميم أبيض وأسود مباين */
        .description-toggle {
            width: 100%;
            background-color: #1a1a1a;
            color: #aaaaaa;
            border: 1px solid #2a2a2a;
            padding: 11px;
            font-size: 0.9rem;
            text-align: right;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .description-toggle:hover {
            background-color: #222222;
            color: #ffffff;
            border-color: #444444;
        }

        .arrow {
            transform: rotate(0deg);
            transition: transform 0.3s;
            display: inline-block;
            font-size: 0.8rem;
            color: #ffffff;
        }

        /* محتوى الوصف المخفي */
        .description-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #161616;
            border-radius: 4px;
        }

        .description-text {
            padding: 10px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #cccccc;
        }

        /* زر الانتقال للرابط - تصميم ناصع وفخم */
        .action-btn {
            display: block;
            text-align: center;
            background-color: #ffffff; /* خلفية بيضاء */
            color: #000000; /* كتابة سوداء */
            text-decoration: none;
            padding: 11px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9rem;
            border: 1px solid #ffffff;
        }

        .action-btn:hover {
            background-color: #000000; /* يعكس الألوان عند الوقوف عليه */
            color: #ffffff;
            border-color: #ffffff;
        }

        /* الشاشات الصغيرة والموبايل */
        @media (max-width: 480px) {
            .grid-container { gap: 12px; padding: 0; }
            body { padding: 10px; }
            h1 { font-size: 1.6rem; margin-bottom: 25px; }
            .channel-card { border-radius: 10px; }
            .channel-details { padding: 10px; gap: 8px; }
            .channel-title { font-size: 0.95rem; }
            .description-toggle { padding: 8px; font-size: 0.8rem; }
            .action-btn { padding: 9px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="grid-container">

        <div class="channel-card">

                <button class="description-toggle" onclick="toggleDescription(this)"><span>الوصف</span><span class="arrow">▼</span></button>
                <div class="description-content"><div class="description-text">اكتب الوصف هنا</div></div>
                <a href="#" target="_blank" class="action-btn">دخول الرابط</a>
            </div>
        </div>

        <div class="channel-card">
            <div class="screenshot-container"><img src="2.png" alt="شاشة القناة 2"></div>
            <div class="channel-details">
                <div class="channel-title">اسم القناة 2 هنا</div>
                <button class="description-toggle" onclick="toggleDescription(this)"><span>الوصف</span><span class="arrow">▼</span></button>
                <div class="description-content"><div class="description-text">اكتب الوصف هنا</div></div>

        </div>

        <div class="channel-card">

            <div class="channel-details">

                <div class="description-content"><div class="description-text">اكتب الوصف هنا</div></div>
                <a href="#" target="_blank" class="action-btn">دخول الرابط</a>

        </div>

        <div class="channel-card">

            <div class="channel-details">

                <button class="description-toggle" onclick="toggleDescription(this)"><span>الوصف</span><span class="arrow">▼</span></button>
                <div class="description-content"><div class="description-text">اكتب الوصف هنا</div></div>
                <a href="#" target="_blank" class="action-btn">دخول الرابط</a>

        </div>

        <div class="channel-card">
            <div class="screenshot-container"><img src="6.png" alt="شاشة القناة 6"></div>
            <div class="channel-details">

            </div>
        </div>

    </div>

    <script>
        // دالة الأكورديون لفتح وإغلاق الوصف بسلاسة
        function toggleDescription(button) {
            button.classList.toggle("active");
            const arrow = button.querySelector(".arrow");
            
            if (button.classList.contains("active")) {
                arrow.style.transform = "rotate(180deg)";
            } else {
                arrow.style.transform = "rotate(0deg)";
            }

            const content = button.nextElementSibling;
            if (content.style.maxHeight) {
                content.style.maxHeight = null;
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
            }
        }
    </script>
</body>
</html>
